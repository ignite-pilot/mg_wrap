AWSTemplateFormatVersion: "2010-09-09"
Description: "MG-Wrap Enterprise Application Infrastructure - All-in-One Stack"

################################################################################
# PARAMETERS
################################################################################

Parameters:
  Environment:
    Type: String
    Default: alpha
    AllowedValues: [alpha, prod]
    Description: "Environment name"

  ApplicationName:
    Type: String
    Default: mg-wrap-enterprise
    Description: "Application name"

  # VPC and Network Configuration
  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-0827b111175321f7d
    Description: "dev-ignite-vpc"

  VpcCidr:
    Type: String
    Default: "10.0.0.0/16"
    Description: "VPC CIDR block for internal access"

  VpnCidr:
    Type: String
    Default: "10.255.0.0/16"
    Description: "VPN CIDR block for VPN client access"

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Default: "subnet-085f255891e429518,subnet-06e36d9971e240bcd"
    Description: "Public subnets for ALB"

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Default: "subnet-03817ad2259e27531,subnet-0648082fbca5badde"
    Description: "Private subnets for ECS Tasks and RDS"

  # Database Configuration
  DBUsername:
    Type: String
    Default: mgwrap_admin
    Description: "Database master username"
    NoEcho: false

  DBPassword:
    Type: String
    NoEcho: true
    Description: "Database master password (min 8 characters)"
    MinLength: 8

  DBName:
    Type: String
    Default: mg_wrap
    Description: "Database name"

  # Application Configuration
  ContainerPort:
    Type: Number
    Default: 5000
    Description: "Container port"

  HealthCheckPath:
    Type: String
    Default: /api/health
    Description: "Health check path"

  # Domain Configuration
  RootDomain:
    Type: String
    Default: "ig-pilot.com"
    Description: "Root domain name (e.g., ig-pilot.com)"

  CreateHostedZone:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: "Create a new Route53 Hosted Zone for the root domain (set to false if using existing zone)"

  HostedZoneId:
    Type: String
    Default: ""
    Description: "Optional: Existing Route53 Hosted Zone ID (required if CreateHostedZone is false)"

  # Google OAuth Configuration (will be set as environment variables)
  GoogleClientId:
    Type: String
    Default: ""
    Description: "Optional: Google OAuth Client ID"
    NoEcho: false

  GoogleClientSecret:
    Type: String
    Default: ""
    Description: "Optional: Google OAuth Client Secret"
    NoEcho: true

  SecretKey:
    Type: String
    Default: ""
    Description: "Optional: Flask SECRET_KEY for session encryption (auto-generated if empty)"
    NoEcho: true

################################################################################
# CONDITIONS
################################################################################

Conditions:
  IsProduction: !Equals [!Ref Environment, prod]
  IsVPNRestricted: !Or
    - !Equals [!Ref Environment, alpha]
    - !Equals [!Ref Environment, beta]
  ShouldCreateHostedZone: !Equals [!Ref CreateHostedZone, "true"]
  HasExistingHostedZone: !Not [!Equals [!Ref HostedZoneId, ""]]
  HasGoogleOAuth: !Not [!Equals [!Ref GoogleClientId, ""]]
  HasSecretKey: !Not [!Equals [!Ref SecretKey, ""]]

################################################################################
# MAPPINGS
################################################################################

Mappings:
  EnvironmentConfig:
    alpha:
      # RDS
      DBInstanceClass: db.t3.micro
      DBAllocatedStorage: 20
      # ECS
      CapacityProvider: FARGATE_SPOT
      Memory: 2048
      Cpu: 1024
      DesiredCount: 1
    prod:
      # RDS
      DBInstanceClass: db.t3.small
      DBAllocatedStorage: 50
      # ECS
      CapacityProvider: FARGATE
      Memory: 4096
      Cpu: 2048
      DesiredCount: 2

################################################################################
# RESOURCES
################################################################################

Resources:
  # ==========================================================================
  # SECTION 1: Security Groups
  # ==========================================================================

  # ALB Security Group
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${Environment}-${ApplicationName}-alb-sg"
      GroupDescription: "Security group for Application Load Balancer"
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - CidrIp: "0.0.0.0/0"
          IpProtocol: "-1"
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ApplicationName}-alb-sg"
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: !Ref ApplicationName
        - Key: AccessType
          Value: !If [IsVPNRestricted, "VPN-Only", "Public"]

  # ALB Security Group Ingress - HTTP from VPC (for VPN-restricted environments)
  ALBSecurityGroupIngressHTTPVpc:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: IsVPNRestricted
    Properties:
      GroupId: !Ref ALBSecurityGroup
      IpProtocol: tcp
      FromPort: 80
      ToPort: 80
      CidrIp: !Ref VpcCidr
      Description: "HTTP from VPC"

  # ALB Security Group Ingress - HTTPS from VPC (for VPN-restricted environments)
  ALBSecurityGroupIngressHTTPSVpc:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: IsVPNRestricted
    Properties:
      GroupId: !Ref ALBSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: !Ref VpcCidr
      Description: "HTTPS from VPC"

  # ALB Security Group Ingress - HTTP from VPN (for VPN-restricted environments)
  ALBSecurityGroupIngressHTTPVpn:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: IsVPNRestricted
    Properties:
      GroupId: !Ref ALBSecurityGroup
      IpProtocol: tcp
      FromPort: 80
      ToPort: 80
      CidrIp: !Ref VpnCidr
      Description: "HTTP from VPN"

  # ALB Security Group Ingress - HTTPS from VPN (for VPN-restricted environments)
  ALBSecurityGroupIngressHTTPSVpn:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: IsVPNRestricted
    Properties:
      GroupId: !Ref ALBSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: !Ref VpnCidr
      Description: "HTTPS from VPN"

  # ALB Security Group Ingress - HTTP from anywhere (for Production)
  ALBSecurityGroupIngressHTTPPublic:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: IsProduction
    Properties:
      GroupId: !Ref ALBSecurityGroup
      IpProtocol: tcp
      FromPort: 80
      ToPort: 80
      CidrIp: "0.0.0.0/0"
      Description: "HTTP from anywhere"

  # ALB Security Group Ingress - HTTPS from anywhere (for Production)
  ALBSecurityGroupIngressHTTPSPublic:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: IsProduction
    Properties:
      GroupId: !Ref ALBSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: "0.0.0.0/0"
      Description: "HTTPS from anywhere"

  # ECS Tasks Security Group
  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${Environment}-${ApplicationName}-ecs-sg"
      GroupDescription: "Security group for ECS tasks"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - SourceSecurityGroupId: !Ref ALBSecurityGroup
          FromPort: !Ref ContainerPort
          IpProtocol: tcp
          ToPort: !Ref ContainerPort
      SecurityGroupEgress:
        - CidrIp: "0.0.0.0/0"
          IpProtocol: "-1"
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ApplicationName}-ecs-sg"
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: !Ref ApplicationName

  # RDS Security Group
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${Environment}-${ApplicationName}-rds-sg"
      GroupDescription: "Security group for RDS PostgreSQL"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - SourceSecurityGroupId: !Ref ECSSecurityGroup
          FromPort: 5432
          IpProtocol: tcp
          ToPort: 5432
      SecurityGroupEgress:
        - CidrIp: "0.0.0.0/0"
          IpProtocol: "-1"
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ApplicationName}-rds-sg"
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: !Ref ApplicationName

  # ==========================================================================
  # SECTION 2: RDS PostgreSQL Database
  # ==========================================================================

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Sub "${Environment}-${ApplicationName}-db-subnet-group"
      DBSubnetGroupDescription: "Subnet group for RDS PostgreSQL"
      SubnetIds: !Ref PrivateSubnetIds
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ApplicationName}-db-subnet-group"
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: !Ref ApplicationName

  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub "${Environment}-${ApplicationName}-db"
      Engine: postgres
      EngineVersion: "15.15"
      DBInstanceClass: !FindInMap [EnvironmentConfig, !Ref Environment, DBInstanceClass]
      AllocatedStorage: !FindInMap [EnvironmentConfig, !Ref Environment, DBAllocatedStorage]
      StorageType: gp3
      StorageEncrypted: true
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      DBName: !Ref DBName
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      PubliclyAccessible: false
      BackupRetentionPeriod: !If [IsProduction, 7, 3]
      PreferredBackupWindow: "03:00-04:00"
      PreferredMaintenanceWindow: "mon:04:00-mon:05:00"
      MultiAZ: !If [IsProduction, true, false]
      AutoMinorVersionUpgrade: true
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ApplicationName}-db"
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: !Ref ApplicationName

  # ==========================================================================
  # SECTION 3: ECR Repository
  # ==========================================================================

  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${ApplicationName}/${Environment}"
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire untagged images older than 7 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 7
                },
                "action": {
                  "type": "expire"
                }
              },
              {
                "rulePriority": 2,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: !Ref ApplicationName

  # ==========================================================================
  # SECTION 4: ECS Cluster & CloudWatch Logs
  # ==========================================================================

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${Environment}-${ApplicationName}-cluster"
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: !FindInMap [EnvironmentConfig, !Ref Environment, CapacityProvider]
          Weight: 1
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ApplicationName}-cluster"
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: !Ref ApplicationName

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${Environment}-${ApplicationName}"
      RetentionInDays: !If [IsProduction, 90, 30]

  # ==========================================================================
  # SECTION 5: Application Load Balancer
  # ==========================================================================

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${Environment}-${ApplicationName}-alb"
      Scheme: internet-facing
      Type: application
      Subnets: !Ref PublicSubnetIds
      SecurityGroups:
        - !Ref ALBSecurityGroup
      IpAddressType: ipv4
      LoadBalancerAttributes:
        - Key: idle_timeout.timeout_seconds
          Value: "60"
        - Key: deletion_protection.enabled
          Value: "false"
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ApplicationName}-alb"
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: !Ref ApplicationName

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${Environment}-${ApplicationName}-tg"
      Port: !Ref ContainerPort
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckPath: !Ref HealthCheckPath
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ApplicationName}-tg"
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: !Ref ApplicationName

  # HTTP Listener (redirects to HTTPS)
  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP

  # HTTPS Listener
  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref ACMCertificate
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06

  # ==========================================================================
  # SECTION 6: Route53 Hosted Zone
  # ==========================================================================

  HostedZone:
    Type: AWS::Route53::HostedZone
    Condition: ShouldCreateHostedZone
    Properties:
      Name: !Ref RootDomain
      HostedZoneConfig:
        Comment: !Sub "Hosted zone for ${RootDomain}"

  # ==========================================================================
  # SECTION 7: ACM Certificate (Wildcard)
  # ==========================================================================

  ACMCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Sub "*.${ApplicationName}.${RootDomain}"
      SubjectAlternativeNames:
        - !Sub "${ApplicationName}.${RootDomain}"
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Sub "*.${ApplicationName}.${RootDomain}"
          HostedZoneId: !If
            - ShouldCreateHostedZone
            - !Ref HostedZone
            - !Ref HostedZoneId
      Tags:
        - Key: Name
          Value: !Sub "${ApplicationName}-wildcard-cert"
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: !Ref ApplicationName

  # ==========================================================================
  # SECTION 8: Route53 DNS Record
  # ==========================================================================

  DNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !If
        - ShouldCreateHostedZone
        - !Ref HostedZone
        - !Ref HostedZoneId
      Name: !If
        - IsProduction
        - !Sub "${ApplicationName}.${RootDomain}"
        - !Sub "${Environment}.${ApplicationName}.${RootDomain}"
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApplicationLoadBalancer.DNSName
        HostedZoneId: !GetAtt ApplicationLoadBalancer.CanonicalHostedZoneID
        EvaluateTargetHealth: true

  # ==========================================================================
  # SECTION 8: ECS Task Definition
  # ==========================================================================

  ECSTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${Environment}-${ApplicationName}-task"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: !FindInMap [EnvironmentConfig, !Ref Environment, Cpu]
      Memory: !FindInMap [EnvironmentConfig, !Ref Environment, Memory]
      ExecutionRoleArn: !Sub "arn:aws:iam::${AWS::AccountId}:role/ecsTaskExecutionRole"
      ContainerDefinitions:
        - Name: !Sub "${Environment}-${ApplicationName}-container"
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepository}:latest"
          Essential: true
          Memory: !FindInMap [EnvironmentConfig, !Ref Environment, Memory]
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: ecs
          Environment:
            - Name: ENV
              Value: !Ref Environment
            - Name: APPLICATION_NAME
              Value: !Ref ApplicationName
            - Name: DB_HOST
              Value: !GetAtt RDSInstance.Endpoint.Address
            - Name: DB_PORT
              Value: !GetAtt RDSInstance.Endpoint.Port
            - Name: DB_NAME
              Value: !Ref DBName
            - Name: DB_USER
              Value: !Ref DBUsername
            - Name: DB_PASSWORD
              Value: !Ref DBPassword
            - Name: GOOGLE_CLIENT_ID
              Value: !If [HasGoogleOAuth, !Ref GoogleClientId, ""]
            - Name: GOOGLE_CLIENT_SECRET
              Value: !If [HasGoogleOAuth, !Ref GoogleClientSecret, ""]
            - Name: SECRET_KEY
              Value: !If [HasSecretKey, !Ref SecretKey, !Sub "${AWS::StackName}-default-secret-key"]
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ApplicationName}-task"
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: !Ref ApplicationName

  # ==========================================================================
  # SECTION 9: ECS Service
  # ==========================================================================

  ECSService:
    Type: AWS::ECS::Service
    DependsOn:
      - HTTPListener
    Properties:
      ServiceName: !Sub "${Environment}-${ApplicationName}-service"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref ECSTaskDefinition
      DesiredCount: !FindInMap [EnvironmentConfig, !Ref Environment, DesiredCount]
      LaunchType: FARGATE
      PlatformVersion: LATEST
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref ECSSecurityGroup
          Subnets: !Ref PrivateSubnetIds
      LoadBalancers:
        - TargetGroupArn: !Ref TargetGroup
          ContainerName: !Sub "${Environment}-${ApplicationName}-container"
          ContainerPort: !Ref ContainerPort
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 0
        DeploymentCircuitBreaker:
          Enable: false
          Rollback: false
      HealthCheckGracePeriodSeconds: 60
      Tags:
        - Key: Name
          Value: !Sub "${Environment}-${ApplicationName}-service"
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: !Ref ApplicationName

################################################################################
# OUTPUTS
################################################################################

Outputs:
  # Route53
  HostedZoneId:
    Condition: ShouldCreateHostedZone
    Description: "Route53 Hosted Zone ID"
    Value: !Ref HostedZone
    Export:
      Name: !Sub "${AWS::StackName}-HostedZoneId"

  HostedZoneNameServers:
    Condition: ShouldCreateHostedZone
    Description: "Name servers for the hosted zone (configure these at your domain registrar)"
    Value: !Join [", ", !GetAtt HostedZone.NameServers]

  # Domain
  ApplicationDomain:
    Description: "Application Domain Name"
    Value: !If
      - IsProduction
      - !Sub "${ApplicationName}.${RootDomain}"
      - !Sub "${Environment}.${ApplicationName}.${RootDomain}"
    Export:
      Name: !Sub "${AWS::StackName}-ApplicationDomain"

  ApplicationURL:
    Description: "Application URL"
    Value: !If
      - IsProduction
      - !Sub "https://${ApplicationName}.${RootDomain}"
      - !Sub "https://${Environment}.${ApplicationName}.${RootDomain}"
    Export:
      Name: !Sub "${AWS::StackName}-ApplicationURL"

  # Certificate
  CertificateArn:
    Description: "ACM Certificate ARN"
    Value: !Ref ACMCertificate
    Export:
      Name: !Sub "${AWS::StackName}-CertificateArn"

  # ECR
  ECRRepositoryURI:
    Description: "ECR Repository URI"
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepository}"
    Export:
      Name: !Sub "${AWS::StackName}-ECRRepositoryURI"

  # RDS
  RDSEndpoint:
    Description: "RDS Endpoint Address"
    Value: !GetAtt RDSInstance.Endpoint.Address
    Export:
      Name: !Sub "${AWS::StackName}-RDSEndpoint"

  RDSPort:
    Description: "RDS Endpoint Port"
    Value: !GetAtt RDSInstance.Endpoint.Port
    Export:
      Name: !Sub "${AWS::StackName}-RDSPort"

  # Load Balancer
  LoadBalancerDNS:
    Description: "Application Load Balancer DNS Name"
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub "${AWS::StackName}-LoadBalancerDNS"

  # ECS
  ClusterName:
    Description: "ECS Cluster Name"
    Value: !Ref ECSCluster
    Export:
      Name: !Sub "${AWS::StackName}-ClusterName"

  ServiceName:
    Description: "ECS Service Name"
    Value: !GetAtt ECSService.Name
    Export:
      Name: !Sub "${AWS::StackName}-ServiceName"

# ==============================================================================
# AWS 애플리케이션 배포 설정 파일
# ==============================================================================
#
# 이 파일 하나로 모든 배포 설정을 관리할 수 있습니다.
# 대부분의 항목은 자동으로 감지되므로, 필요한 경우에만 주석을 해제하여 사용하세요.
#
# 사용법:
#   1. 이 파일을 복사: cp config.yaml config.alpha.yaml
#   2. 아래 필수 항목 4줄만 수정
#   3. 배포: ./scripts/deploy.sh config.alpha.yaml
#
# ==============================================================================

# ==============================================================================
# 필수 설정 (반드시 입력해야 하는 항목)
# ==============================================================================

application_name: "my-app"           # 애플리케이션 이름 (알파벳으로 시작, 알파벳/숫자/하이픈/-만 사용, 언더스코어는 자동으로 하이픈으로 변환)
deployment_phase: "alpha"            # 배포 환경: alpha, beta, production
aws_profile: "default"               # AWS CLI 프로필 이름
root_domain: "ig-pilot.com"          # 루트 도메인 (예: my-app.ig-pilot.com)

# ==============================================================================
# 자동 감지 항목 (필요시에만 주석 해제하여 재정의)
# ==============================================================================

# ------------------------------------------------------------------------------
# 앱 타입 (자동 감지)
# ------------------------------------------------------------------------------
# - Dockerfile이 있으면 → fullstack
# - dist/, build/, public/ 폴더가 있으면 → static
# - 명시적으로 지정하려면 아래 주석 해제:
#
# app_type: "fullstack"  # 또는 "static"

# ==============================================================================
# 데이터베이스 설정 (Full-Stack 앱만 해당)
# ==============================================================================

# ------------------------------------------------------------------------------
# 데이터베이스 비밀번호
# ------------------------------------------------------------------------------
# Full-Stack 앱에서 데이터베이스를 사용하는 경우 필수입니다.
# 최소 8자 이상이어야 합니다.
#
# 방법 1: config 파일에 직접 입력 (주의: Git에 커밋하지 마세요!)
# db_password: "your-secure-password-here"
#
# 방법 2: 환경 변수로 전달 (권장)
# export DB_PASSWORD='your-secure-password'
# ./scripts/deploy.sh config.alpha.yaml
#
db_password: ""

# ------------------------------------------------------------------------------
# 데이터베이스 엔진 및 설정
# ------------------------------------------------------------------------------
# 기본값: PostgreSQL 사용, 데이터베이스 활성화
# 변경하려면 아래 주석 해제:
#
# database:
#   enabled: true                           # false로 설정하면 DB 없이 배포
#   engine: "postgres"                      # "postgres" 또는 "mysql"
#   username: "app_admin"                   # DB 사용자명 (선택사항)
#   database_name: "app_db"                 # DB 이름 (선택사항)

# ------------------------------------------------------------------------------
# AWS 리전 (자동 감지)
# ------------------------------------------------------------------------------
# AWS CLI 프로필 설정에서 자동으로 추출됩니다.
# 재정의하려면 아래 주석 해제:
#
# aws_region: "ap-northeast-2"

# ------------------------------------------------------------------------------
# VPC 설정 (자동 검색)
# ------------------------------------------------------------------------------
# Full-Stack 앱의 경우 태그 이름에 'dev' 또는 'ignite'가 포함된 VPC를 자동 검색합니다.
# 서브넷도 태그 이름에 'public'/'private'로 자동 검색됩니다.
# 수동으로 지정하려면 아래 주석 해제:
#
# vpc:
#   vpc_id: "vpc-xxxxx"                    # VPC ID
#   public_subnet_ids:                      # Public 서브넷 (ALB 배치용)
#     - "subnet-xxxxx"
#     - "subnet-yyyyy"
#   private_subnet_ids:                     # Private 서브넷 (ECS/RDS 배치용)
#     - "subnet-aaaaa"
#     - "subnet-bbbbb"

# ------------------------------------------------------------------------------
# 도메인 설정 (자동 검색)
# ------------------------------------------------------------------------------
# Route53 Hosted Zone은 root_domain 기반으로 자동 검색됩니다.
# 수동으로 지정하려면 아래 주석 해제:
#
# domain:
#   hosted_zone_id: "Z029xxxxx"             # Route53 Hosted Zone ID

# ------------------------------------------------------------------------------
# 컨테이너 포트 (자동 감지)
# ------------------------------------------------------------------------------
# Dockerfile의 EXPOSE 명령어에서 자동으로 추출됩니다.
# 재정의하려면 아래 주석 해제:
#
# container_port: 5000

# ------------------------------------------------------------------------------
# Docker 플랫폼 (Full-Stack 앱만 해당)
# ------------------------------------------------------------------------------
# Docker 이미지를 빌드할 때 사용할 플랫폼을 지정합니다.
# 기본값: linux/amd64 (AWS ECS Fargate는 amd64 아키텍처를 사용)
# Apple Silicon (M1/M2/M3) Mac에서도 기본값을 권장합니다.
# 재정의하려면 아래 주석 해제:
#
# docker_platform: "linux/amd64"     # 또는 "linux/arm64"

# ------------------------------------------------------------------------------
# Health Check 경로
# ------------------------------------------------------------------------------
# 기본값은 "/health"입니다.
# 다른 경로를 사용하려면 아래 주석 해제:
#
# health_check_path: "/api/health"

# ==============================================================================
# Static 웹사이트 설정 (Static 앱만 해당)
# ==============================================================================

# ------------------------------------------------------------------------------
# 소스 디렉토리
# ------------------------------------------------------------------------------
# 빌드된 정적 파일이 있는 디렉토리를 지정합니다.
# 자동 감지 순서: ./dist → ./build → ./public
# 재정의하려면 아래 주석 해제:
#
# static:
#   source_directory: "./dist"              # 빌드 결과물 디렉토리
#   index_document: "index.html"            # 기본 문서
#   error_document: "404.html"              # 에러 문서 (SPA는 index.html 권장)
#
#   # CloudFront 캐시 설정
#   cloudfront:
#     price_class: "PriceClass_100"         # PriceClass_100 (저렴) / PriceClass_All (글로벌)
#     default_ttl: 86400                    # 기본 캐시 시간 (초, 1일)
#     max_ttl: 31536000                     # 최대 캐시 시간 (초, 1년)

# ==============================================================================
# 환경 변수 (Full-Stack 앱만 해당)
# ==============================================================================

# 컨테이너에 전달할 환경 변수를 지정할 수 있습니다.
# 아래 주석 해제 후 필요한 변수 추가:
#
# environment_variables:
#   NODE_ENV: "production"
#   GOOGLE_CLIENT_ID: "your-client-id"
#   GOOGLE_CLIENT_SECRET: "your-secret"
#   SECRET_KEY: "your-secret-key"
#   API_URL: "https://api.example.com"

# ==============================================================================
# 리소스 크기 조정 (고급 설정)
# ==============================================================================

# 환경별 기본 리소스 크기:
#
# Alpha/Beta:
#   - RDS: db.t3.micro, 20GB, 단일 AZ, FARGATE_SPOT
#   - ECS: 1 vCPU, 2GB RAM, 1개 태스크
#   - 백업: 3일 보관
#   - 비용: ~$45-55/월
#
# Production:
#   - RDS: db.t3.small, 50GB, Multi-AZ, FARGATE
#   - ECS: 2 vCPU, 4GB RAM, 2개 태스크
#   - 백업: 7일 보관
#   - 비용: ~$110-130/월
#
# 리소스 크기를 변경하려면 아래 주석 해제:
#
# resources:
#   # RDS 설정 (Full-Stack 앱만 해당)
#   rds_instance_class: "db.t3.small"       # db.t3.micro, db.t3.small, db.t3.medium 등
#   rds_allocated_storage: 50               # GB 단위
#   rds_multi_az: false                     # true = Multi-AZ (고가용성)
#   rds_backup_retention: 7                 # 백업 보관 일수
#
#   # ECS 설정 (Full-Stack 앱만 해당)
#   ecs_cpu: 2048                           # 256, 512, 1024, 2048, 4096 (0.25~4 vCPU)
#   ecs_memory: 4096                        # CPU에 따라 허용 범위 다름 (MB)
#   ecs_desired_count: 2                    # 실행할 태스크 수
#   ecs_capacity_provider: "FARGATE"        # FARGATE 또는 FARGATE_SPOT

# ==============================================================================
# 도움말
# ==============================================================================
#
# 전체 문서:     README.md
# 빠른 시작:     QUICKSTART.md
#
# 배포:          ./scripts/deploy.sh config.alpha.yaml
# 삭제:          ./scripts/destroy.sh config.alpha.yaml
#
# ==============================================================================

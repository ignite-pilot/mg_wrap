AWSTemplateFormatVersion: '2010-09-09'
Description: 'ECR Repository for Container Images'

################################################################################
# Parameters
################################################################################

Parameters:
  ApplicationName:
    Type: String
    Description: Application name (will be converted to lowercase with hyphens)
    AllowedPattern: ^[a-zA-Z][-a-zA-Z0-9]*$
    ConstraintDescription: Must start with a letter and contain only alphanumeric characters and hyphens

  DeploymentPhase:
    Type: String
    Description: Deployment phase
    AllowedValues:
      - alpha
      - beta
      - production
    Default: alpha

################################################################################
# Resources
################################################################################

Resources:
  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${ApplicationName}/${DeploymentPhase}"
      ImageScanningConfiguration:
        ScanOnPush: true
      EncryptionConfiguration:
        EncryptionType: AES256
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire untagged images older than 7 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 7
                },
                "action": {
                  "type": "expire"
                }
              },
              {
                "rulePriority": 2,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
      Tags:
        - Key: DeploymentPhase
          Value: !Ref DeploymentPhase
        - Key: Application
          Value: !Ref ApplicationName

################################################################################
# Outputs
################################################################################

Outputs:
  ECRRepositoryURI:
    Description: ECR Repository URI
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${ECRRepository}"
    Export:
      Name: !Sub "${AWS::StackName}-ECRRepositoryURI"

  ECRRepositoryName:
    Description: ECR Repository Name
    Value: !Ref ECRRepository
    Export:
      Name: !Sub "${AWS::StackName}-ECRRepositoryName"
